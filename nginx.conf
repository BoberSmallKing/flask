upstream worker_nodes {
    least_conn;
    server 192.168.0.111:5000;
    server 192.168.0.112:5000;
}

server {
    listen 80;
    server_name 192.168.0.110;
    keepalive_timeout 0;
    location / {
        proxy_pass http://worker_nodes;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}